<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — Stage & Shears</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <div class="login-logo-square">S</div>
      <div class="login-logo-title">Stage / Shears</div>
      <div class="login-logo-sub">Barbería · Belgrano</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'success' if category == 'success' else 'error' if category == 'error' else 'info' }}" style="margin-bottom:16px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-form">
      <h2>Crear Cuenta</h2>
      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label class="form-label" for="name">Nombre completo</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-control"
            placeholder="Juan Pérez"
            required
            autocomplete="name"
            value="{{ request.form.get('name', '') }}"
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            placeholder="tu@email.com"
            required
            autocomplete="email"
            value="{{ request.form.get('email', '') }}"
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Mínimo 4 caracteres"
            required
            autocomplete="new-password"
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="password2">Repetir contraseña</label>
          <input
            type="password"
            id="password2"
            name="password2"
            class="form-control"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          >
        </div>
        <button type="submit" class="btn btn-primary">Crear cuenta</button>
      </form>
    </div>

    <div class="login-footer">
      ¿Ya tenés cuenta?
      <a href="{{ url_for('login') }}" class="login-footer-link">Iniciá sesión</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
